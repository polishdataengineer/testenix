<svg xmlns="http://www.w3.org/2000/svg" width="980" height="466" viewBox="0 0 980 466" role="img" aria-labelledby="title description">
<title id="title">Preliminary Testenix benchmark throughput ratios</title>
<desc id="description">Horizontal bars compare Testenix throughput with pytest and pytest-xdist for three checked-in synthetic benchmark scenarios.</desc>
<style>.title{font:700 22px system-ui,sans-serif;fill:#0f172a}.subtitle,.tick,.legend{font:13px system-ui,sans-serif;fill:#475569}.label{font:600 14px system-ui,sans-serif;fill:#1e293b}.value{font:700 13px system-ui,sans-serif;fill:#0f172a}.grid{stroke:#cbd5e1;stroke-width:1}</style>
<rect width="980" height="100%" rx="16" fill="#ffffff"/>
<text class="title" x="32" y="36">Synthetic benchmark throughput ratio</text>
<text class="subtitle" x="32" y="60">Higher is better · 1× means equal throughput</text>
<line class="grid" x1="285.0" y1="82" x2="285.0" y2="424"/>
<text class="tick" x="285.0" y="78" text-anchor="middle">0×</text>
<line class="grid" x1="440.0" y1="82" x2="440.0" y2="424"/>
<text class="tick" x="440.0" y="78" text-anchor="middle">1×</text>
<line class="grid" x1="595.0" y1="82" x2="595.0" y2="424"/>
<text class="tick" x="595.0" y="78" text-anchor="middle">2×</text>
<line class="grid" x1="750.0" y1="82" x2="750.0" y2="424"/>
<text class="tick" x="750.0" y="78" text-anchor="middle">3×</text>
<line class="grid" x1="905.0" y1="82" x2="905.0" y2="424"/>
<text class="tick" x="905.0" y="78" text-anchor="middle">4×</text>
<text class="label" x="32" y="119">10k no-op</text>
<text class="legend" x="273" y="123" text-anchor="end">vs pytest</text>
<rect x="285" y="108" width="380.5" height="22" rx="5" fill="#2563eb"/>
<text class="value" x="673.5" y="124">2.46×</text>
<text class="legend" x="273" y="157" text-anchor="end">vs pytest-xdist</text>
<rect x="285" y="142" width="488.2" height="22" rx="5" fill="#7c3aed"/>
<text class="value" x="781.2" y="158">3.15×</text>
<text class="label" x="32" y="231">10k uneven</text>
<text class="legend" x="273" y="235" text-anchor="end">vs pytest</text>
<rect x="285" y="220" width="366.5" height="22" rx="5" fill="#2563eb"/>
<text class="value" x="659.5" y="236">2.36×</text>
<text class="legend" x="273" y="269" text-anchor="end">vs pytest-xdist</text>
<rect x="285" y="254" width="383.3" height="22" rx="5" fill="#7c3aed"/>
<text class="value" x="676.3" y="270">2.47×</text>
<text class="label" x="32" y="343">100k no-op</text>
<text class="legend" x="273" y="347" text-anchor="end">vs pytest</text>
<rect x="285" y="332" width="440.2" height="22" rx="5" fill="#2563eb"/>
<text class="value" x="733.2" y="348">2.84×</text>
<text class="legend" x="273" y="381" text-anchor="end">vs pytest-xdist</text>
<rect x="285" y="366" width="574.6" height="22" rx="5" fill="#7c3aed"/>
<text class="value" x="867.6" y="382">3.71×</text>
<text class="subtitle" x="32" y="450">Development baseline · legacy development machine · CPython 3.11.14 · raw samples linked below</text>
</svg>
