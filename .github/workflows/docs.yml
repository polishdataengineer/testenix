name: Documentation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "benchmarks/**"
      - "docs/**"
      - "pyproject.toml"
      - "scripts/generate_docs_assets.py"
      - "src/**"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read # Query the configured Pages site metadata.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --locked --group docs --no-editable
      - run: uv run --group docs --no-editable python scripts/generate_docs_assets.py --check
      - run: uv run --group docs --no-editable sphinx-build -W --keep-going -b dirhtml docs site
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write # Create the GitHub Pages deployment.
      id-token: write # Authenticate the deployment with GitHub OIDC.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
