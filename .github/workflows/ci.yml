name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Install project
        run: uv sync --locked --dev --no-editable
      - name: Run tests
        run: uv run --no-editable pytest

  quality:
    name: Quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv sync --locked --dev --no-editable
      - run: uv run --no-editable ruff check .
      - run: uv run --no-editable ruff format --check .
      - run: uv run --no-editable mypy
      - run: uv run --no-editable pyright --pythonversion 3.11 src/testenix
      - run: uv build --no-sources
      - run: uv run twine check --strict dist/*
      - run: uv run check-wheel-contents dist/*.whl
      - run: uv run --isolated --no-project --with ./dist/testenix-*.whl testenix --version
      - run: uv run --isolated --no-project --with ./dist/testenix-*.whl testenix run examples/basic --no-history
      - run: uv run --isolated --no-project --with ./dist/testenix-*.tar.gz testenix --version
      - run: uv run --isolated --no-project --with ./dist/testenix-*.tar.gz testenix run examples/basic --no-history

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --locked --group docs --no-editable
      - run: uv run --group docs --no-editable python scripts/generate_docs_assets.py --check
      - run: uv run --group docs --no-editable sphinx-build -W --keep-going -b dirhtml docs site

  required:
    name: CI / required
    if: ${{ always() }}
    needs: [test, quality, documentation]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required jobs
        shell: bash
        env:
          TEST_RESULT: ${{ needs.test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          DOCUMENTATION_RESULT: ${{ needs.documentation.result }}
        run: |
          if [[ "$TEST_RESULT" != "success" || "$QUALITY_RESULT" != "success" || "$DOCUMENTATION_RESULT" != "success" ]]; then
            echo "::error::Required CI jobs did not pass (test=$TEST_RESULT, quality=$QUALITY_RESULT, documentation=$DOCUMENTATION_RESULT)"
            exit 1
          fi
