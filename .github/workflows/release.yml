name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.11"
          enable-cache: false
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: test "$RELEASE_TAG" = "v$(uv version --short)"
      - name: Verify release commit belongs to main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::The release tag must point to a commit contained in main"
            exit 1
          fi
      - run: uv sync --locked --dev --no-editable
      - run: uv run --no-editable pytest
      - run: uv run --no-editable ruff check .
      - run: uv run --no-editable ruff format --check .
      - run: uv run --no-editable mypy
      - run: uv run --no-editable pyright --pythonversion 3.11 src/testenix
      - run: uv build --no-sources
      - run: uv run twine check --strict dist/*
      - run: uv run check-wheel-contents dist/*.whl
      - run: uv run --isolated --no-project --with ./dist/testenix-*.whl testenix --version
      - run: uv run --isolated --no-project --with ./dist/testenix-*.whl testenix run examples/basic --no-history
      - run: uv run --isolated --no-project --with ./dist/testenix-*.tar.gz testenix --version
      - run: uv run --isolated --no-project --with ./dist/testenix-*.tar.gz testenix run examples/basic --no-history
      - name: Store distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/testenix
    permissions:
      id-token: write # Authenticate to PyPI via Trusted Publishing.
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/
